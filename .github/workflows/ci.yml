name: Continuous Integration

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  go-checks:
    name: Go Engine Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Build Engine
        run: go build -v ./cmd/worker

      - name: Run Go Tests
        run: go test -v ./...

      - name: Go Vet
        run: go vet ./...

      - name: Verify Docs are up-to-date
        run: |
          go install github.com/princjef/gomarkdoc/cmd/gomarkdoc@latest
          gomarkdoc -o Docs_Check.md ./cmd/worker ./internal/store ./pkg/engine
          diff -w Docs.md Docs_Check.md || (echo "Docs.md is out of sync! Please run 'gomarkdoc' locally." && exit 1)

  python-checks:
    name: Python SDK Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e sdk/python
          pip install flake8

      - name: Lint with flake8
        run: |
          # Stop the build if there are Python syntax errors or undefined names
          flake8 sdk/python --count --select=E9,F63,F7,F82 --show-source --statistics
          # exit-zero treats all errors as warnings. 
          flake8 sdk/python --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: Verify SDK Import
        run: python -c "import rundown_workers; print('SDK import successful')"
